<!DOCTYPE html>
<html>

<head>
    <style>
        :root {
            --webview-width: 256px;
            --splitter-width: 4px;
        }

        webview {
            background-color: var(--uxp-host-background-color) !important;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            color: var(--uxp-host-text-color);
            font-family: -apple-system, sans-serif;
        }

        #splash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #splash .loader-wrapper {
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #splash .minimal-spinner {
            width: 36px;
            height: 36px;
            border: 2px solid rgba(0, 160, 255, 0.1);
            border-top: 2px solid #00a0ff;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 160, 255, 0.1);
        }

        #main_wv {
            width: 100%;
            height: 100%;
        }

        #main_wv.ready {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
        }

        #logic_bridge {
            width: 10px;
            height: 10px;
            opacity: 0;
            visibility: hidden;
            position: absolute;
            top: -100px;
            left: 0;
            pointer-events: none;
            z-index: -1;
        }

        /* Flexbox Split View Layout */
        body.split-view-left,
        body.split-view-right {
            display: flex !important;
            flex-direction: row !important;
            align-items: stretch !important;
            justify-content: flex-start !important;
            overflow: hidden !important;
        }

        /* Logic [L] | Splitter [S] | Biz [B] */
        /* row: L -> S -> B (UI on right) */
        /* row-reverse: B -> S -> L (UI on left) */

        body.split-view-left {
            /* Flip order so UI stays on left */
            flex-direction: row-reverse !important;
        }

        body.split-view-right {
            /* Default order is logic on left, UI on right */
            flex-direction: row !important;
        }

        /* Flexbox Split View Layout Overrides */
        body.split-view-left #main_wv,
        body.split-view-right #main_wv,
        body.split-view-left #logic_bridge,
        body.split-view-right #logic_bridge,
        body.split-view-left #splitter,
        body.split-view-right #splitter {
            position: relative !important;
            height: 100% !important;
            top: auto !important;
            left: auto !important;
            right: auto !important;
            bottom: auto !important;
            margin: 0 !important;
        }

        body.split-view-left #main_wv,
        body.split-view-right #main_wv {
            flex: 0 0 auto !important;
            width: var(--webview-width) !important;
            z-index: 100;
        }

        body.split-view-left #logic_bridge,
        body.split-view-right #logic_bridge {
            flex: 1 1 0 !important;
            width: auto !important;
            min-width: 64px !important;
            opacity: 1 !important;
            visibility: visible !important;
            top: 0 !important;
            pointer-events: auto !important;
            z-index: 50;
        }

        body.split-view-left #splitter,
        body.split-view-right #splitter {
            display: block !important;
            flex: 0 0 auto !important;
            width: var(--splitter-width) !important;
            cursor: ew-resize;
            z-index: 3000;
        }
    </style>
    <meta charset="UTF-8">
</head>

<body>
    <div id="splash">
        <div class="loader-wrapper">
            <div class="minimal-spinner"></div>
        </div>
        <p style="font-size: 11px; opacity: 0.5; letter-spacing: 1px; color: #4f76a1;">Initializing</p>
    </div>
    <!-- [NEW] Logic Bridge and Main UI in Flex Order -->
    <webview id="logic_bridge" enablemessagebridge="yes" allowlocalrendering="yes"></webview>
    <div id="splitter"></div>
    <webview id="main_wv" enablemessagebridge="yes" allowlocalrendering="yes"></webview>

    <!-- Theme Sensor: Hidden element used to strictly sense host theme -->
    <div id="theme-sensor"
        style="position:absolute; top:-100px; left:0; width:1px; height:1px; background-color: var(--uxp-host-background-color); visibility:hidden; pointer-events:none;">
    </div>

    <div id="drag-overlay"></div>
